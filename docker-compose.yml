services:
  mlflow:
    image: python:3.11-slim
    container_name: automl-mlflow
    working_dir: /mlflow
    command: >
      bash -c "pip install --no-cache-dir mlflow==2.18.0 &&
               mlflow server
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow/artifacts
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  api:
    build: .
    container_name: automl-api
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    restart: unless-stopped

volumes:
  mlflow_data:
